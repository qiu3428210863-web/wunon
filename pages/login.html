<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 屋弄家居 UNOspazio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f7f5f0;
    --bg-card: #ffffff;
    --text-primary: #2a2a2a;
    --text-secondary: #6b6b6b;
    --text-muted: #9a9a9a;
    --accent: #8b7355;
    --accent-light: #c4b59a;
    --accent-bg: #efebe6;
    --border: #e5e0d8;
    --font-sans: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  .site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(247, 245, 240, 0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    text-decoration: none;
    color: var(--text-primary);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .site-logo .sub {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .back-link {
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: 1px;
    transition: color .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-link:hover { color: var(--accent); }

  /* ─── Auth Container ─── */
  .auth-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 24px 60px;
  }

  .auth-card {
    background: var(--bg-card);
    width: 100%;
    max-width: 420px;
    padding: 48px 40px 40px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .auth-card .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .auth-card .brand h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--text-primary);
  }
  .auth-card .brand p {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 6px;
  }

  /* ─── Tabs ─── */
  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: var(--font-sans);
    transition: color .2s;
    position: relative;
  }
  .auth-tab.active {
    color: var(--text-primary);
    font-weight: 500;
  }
  .auth-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 20%;
    width: 60%; height: 1.5px;
    background: var(--accent);
  }
  .auth-tab:hover { color: var(--text-primary); }

  /* ─── Form ─── */
  .auth-form { display: none; flex-direction: column; gap: 20px; }
  .auth-form.active { display: flex; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    font-weight: 500;
  }
  .form-group input {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(139, 115, 85, 0.12);
  }
  .form-group input::placeholder { color: var(--text-muted); }

  .form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }
  .form-options label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .form-options label input { accent-color: var(--accent); }
  .form-options a {
    color: var(--accent);
    text-decoration: none;
    transition: color .2s;
  }
  .form-options a:hover { color: var(--text-primary); }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--text-primary);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-family: var(--font-sans);
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background .3s;
    font-weight: 500;
  }
  .btn-submit:hover { background: var(--accent); }

  .auth-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    position: relative;
  }
  .auth-divider::before,
  .auth-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: calc(50% - 24px);
    height: 1px;
    background: var(--border);
  }
  .auth-divider::before { left: 0; }
  .auth-divider::after { right: 0; }

  .social-login {
    display: flex;
    gap: 12px;
  }
  .social-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--text-secondary);
    transition: all .25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .social-btn:hover {
    border-color: var(--accent);
    color: var(--text-primary);
    background: var(--accent-bg);
  }

  .auth-footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
  }
  .auth-footer a {
    color: var(--accent);
    text-decoration: none;
    transition: color .2s;
  }
  .auth-footer a:hover { color: var(--text-primary); }

  .auth-tip {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 24px;
    padding: 12px;
    background: var(--accent-bg);
    border-radius: 2px;
    line-height: 1.6;
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-primary);
    color: #fff;
    padding: 12px 28px;
    border-radius: 4px;
    font-size: 13px;
    opacity: 0;
    visibility: hidden;
    transition: all .35s;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

  /* ─── Scroll Reveal ─── */
  .scroll-reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .scroll-reveal.revealed {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── Responsive ─── */
  @media (max-width: 600px) {
    .header-inner { padding: 0 16px; }
    .auth-card { padding: 32px 24px 28px; border: none; background: transparent; }
    .auth-wrap { padding: 100px 16px 40px; }
    .social-login { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ─── Header ─── -->
<header class="site-header">
  <div class="header-inner">
    <a href="../index.html" class="site-logo">屋弄家居 <span class="sub">UNOspazio</span></a>
    <a href="../index.html" class="back-link">← 返回首页</a>
  </div>
</header>

<!-- ─── Auth ─── -->
<div class="auth-wrap">
  <div class="auth-card scroll-reveal" id="authCard">
    <div class="brand">
      <h1>欢迎回来</h1>
      <p>登录您的屋弄账号</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" data-tab="register" onclick="switchTab('register')">注册</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>手机号 / 邮箱</label>
        <input type="text" placeholder="请输入手机号或邮箱" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" placeholder="请输入密码" required>
      </div>
      <div class="form-options">
        <label><input type="checkbox" checked> 记住我</label>
        <a href="#" onclick="showToast('密码重置功能开发中')">忘记密码？</a>
      </div>
      <button type="submit" class="btn-submit">登 录</button>

      <div class="auth-divider">或</div>

      <div class="social-login">
        <button type="button" class="social-btn" onclick="showToast('微信登录')">微信</button>
        <button type="button" class="social-btn" onclick="showToast('支付宝登录')">支付宝</button>
      </div>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" placeholder="请输入手机号" required>
      </div>
      <div class="form-group">
        <label>验证码</label>
        <div style="display:flex;gap:10px;">
          <input type="text" placeholder="请输入验证码" required style="flex:1;">
          <button type="button" class="btn-submit" style="width:auto;padding:12px 20px;font-size:12px;white-space:nowrap;background:var(--accent);" onclick="showToast('验证码已发送')">获取验证码</button>
        </div>
      </div>
      <div class="form-group">
        <label>设置密码</label>
        <input type="password" placeholder="至少 8 位字符" required minlength="8">
      </div>
      <div class="form-options">
        <label><input type="checkbox" required> 我已阅读并同意 <a href="#" onclick="showToast('用户协议')">用户协议</a></label>
      </div>
      <button type="submit" class="btn-submit">注 册</button>

      <div class="auth-divider">或</div>

      <div class="social-login">
        <button type="button" class="social-btn" onclick="showToast('微信注册')">微信注册</button>
        <button type="button" class="social-btn" onclick="showToast('支付宝注册')">支付宝注册</button>
      </div>
    </form>

    <div class="auth-tip">
      演示页面 — 任意输入即可体验<br>
      实际功能将接入后端服务
    </div>
  </div>
</div>

<script>
  // ─── Toast ───
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ─── Tab Switching ───
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  }

  // ─── Mock Login ───
  function handleLogin(e) {
    e.preventDefault();
    showToast('登录成功！正在跳转…');
    setTimeout(() => { window.location.href = '../index.html'; }, 1500);
  }

  function handleRegister(e) {
    e.preventDefault();
    showToast('注册成功！正在跳转…');
    setTimeout(() => { window.location.href = '../index.html'; }, 1500);
  }

  // ─── Scroll Reveal ───
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });
  document.querySelectorAll('.scroll-reveal').forEach(el => revealObserver.observe(el));
</script>

<!-- ─── 专注度追踪 ─── -->
<script src="../tracker.js"></script>

</body>
</html>
